<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MeowFolio - Sign Up</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<!-- Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/><script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="tailwind-config.js"></script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .cat-mask {
            mask-image: linear-gradient(to top, transparent 5%, black 25%);
        }
    </style>
<meta name="view-transition" content="same-origin" /></head>
<body class="bg-background font-body text-on-background min-h-screen">
<!-- Dimmed Landing Page Backdrop -->
<div class="fixed inset-0 z-0 flex flex-col overflow-hidden pointer-events-none grayscale-[0.5] opacity-40">
<!-- Mock Hero Content -->
<header class="flex justify-between items-center px-10 py-8">
<div class="text-2xl font-black text-primary tracking-tighter font-headline">MeowFolio</div>
<div class="flex gap-6">
<div class="w-24 h-4 bg-surface-variant rounded-full"></div>
<div class="w-24 h-4 bg-surface-variant rounded-full"></div>
</div>
</header>
<main class="flex-1 px-10 flex flex-col items-center justify-center text-center gap-8">
<div class="w-3/4 h-20 bg-surface-container-high rounded-xl"></div>
<div class="grid grid-cols-3 gap-6 w-full max-w-5xl">
<div class="aspect-[3/4] bg-surface-container-low rounded-lg shadow-sm"></div>
<div class="aspect-[3/4] bg-surface-container-low rounded-lg shadow-sm scale-110 ring-4 ring-primary/10"></div>
<div class="aspect-[3/4] bg-surface-container-low rounded-lg shadow-sm"></div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 bg-on-background/20 backdrop-blur-sm flex items-center justify-center p-6">
<!-- Modal Container -->
<div class="relative w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_rgba(28,28,24,0.08)] overflow-visible">
<!-- Mochii Character Zone -->
<div class="absolute -top-24 left-1/2 -translate-x-1/2 w-48 h-32 flex items-end justify-center">
<div class="relative w-32 h-32 bg-primary-container rounded-full flex items-center justify-center overflow-hidden border-4 border-surface-container-lowest shadow-md">
<!-- Mochii Mascot Illustration (Peeking) -->
<img alt="Mochii Mascot" class="w-24 h-24 object-contain translate-y-4" data-alt="A cute coral colored cat peeking over a resume" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDoAPvvEIzTzd7sioKcx14WcNdZP37kmNtpzKfDzh6ajpQ7n5y34zmfvmNIkeBo6NwlBCu9NH6pCzG1ruo32jRlFl_SM21kOYPMZiEPLYaCb9kMumHbWJEOhsX-5UTeJrKFcuXHKHMqDp5xWd2D-2BcfqNHRX1qfacvXW1SkJPeUv11Z1ZsIsjHR_86RYBrKvCFfGzlu1FvGkP8HBFnoO7AWqYDQ05P6v5GORDY-NwMkZzBMuMqucgVM8riaGtP1c6ejFm3zPQ7_ugd"/>
</div>
<!-- Small Floating Resume -->
<div class="absolute bottom-4 right-4 bg-surface-container-lowest p-2 rounded-md shadow-lg rotate-12 border border-outline-variant/20">
<span class="material-symbols-outlined text-primary text-xl" data-icon="description">description</span>
</div>
</div>
<!-- Modal Content -->
<div class="pt-20 pb-10 px-8 text-center">
<!-- Headline & Subtext -->
<div class="mb-10 space-y-3">
<h2 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight">
                        Your resume is ready. 🎉
                    </h2>
<p class="text-on-surface-variant font-medium leading-relaxed max-w-[280px] mx-auto">
                        Save it to your account so you can edit it anytime.
                    </p>
</div>
<!-- Action Button Stack -->
<div class="space-y-4">
<!-- Continue with Google -->
<button class="group w-full flex items-center justify-center gap-3 bg-on-background text-surface py-4 px-6 rounded-full font-headline font-bold text-lg shadow-[0px_4px_0px_#000000] active:shadow-none active:translate-y-1 transition-all duration-150">
<div class="w-6 h-6 bg-white rounded-full flex items-center justify-center overflow-hidden p-0.5">
<img alt="Google Logo" class="w-full h-full object-contain" data-alt="Google colorful logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC7_XuLt2Oe_59Jopt9Sj2yv0UKveYpLxFS5Bf_uAFcyXHOz6SRkpXdjlIqhzrtBhutJHm2iBcqRvdbsIYpNIC5Nr2V1ZxSUOoeb7MkG5dwOSwMOCa8blFLuqqbrFqdNxQApsW7tJVk86ZFn9fLtMw_WmonxruILWHptgn6jI-2LxEcJ1t37xfxGH6H1_dFZFoFi_1ToCQxcmRZq8dQpKhBNRxJP2MB3zBCYpq38mzJNYxq61GDYtViZuE3YfZWju8IWIjQ9xR-MRzS"/>
</div>
                        Continue with Google
                    </button>
<!-- Bubble Badge Info (Tactile Dreamscape style) -->
<div class="inline-flex items-center gap-2 bg-tertiary-fixed text-on-tertiary-fixed-variant px-4 py-1.5 rounded-full text-xs font-bold font-label uppercase tracking-wider">
<span class="material-symbols-outlined text-sm" data-icon="auto_awesome">auto_awesome</span>
                        No credit card required
                    </div>
</div>
<!-- Footer Link -->
<div class="mt-8">
<button class="text-on-surface-variant font-semibold hover:text-primary underline decoration-2 underline-offset-4 transition-colors">
                        Maybe later
                    </button>
</div>
</div>
<!-- Tactile Corner Decoration -->
<div class="absolute -bottom-2 -right-2 w-12 h-12 bg-secondary-container rounded-full -z-10 opacity-50 blur-xl"></div>
<div class="absolute -top-2 -left-2 w-16 h-16 bg-primary-fixed rounded-full -z-10 opacity-40 blur-xl"></div>
</div>
</div>
<script src="app.js"></script></body></html>
