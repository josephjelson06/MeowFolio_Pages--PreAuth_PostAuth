<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(230, 226, 220, 0.6);
        backdrop-filter: blur(20px);
      }
      .custom-shadow {
        box-shadow: 0px 12px 32px rgba(28, 28, 24, 0.06);
      }
      body {
        background-color: #fdf9f3;
        color: #1c1c18;
      }
      .nav-link-active {
        color: #9d4223;
        font-weight: 700;
        position: relative;
      }
      .nav-link-active::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: #9d4223;
        border-radius: 9999px;
      }
      .resume-skeleton {
        background: linear-gradient(135deg, #ffffff 0%, #f7f3ed 100%);

<body class="font-body antialiased min-h-screen flex flex-col">
<!-- TopNavBar -->
<nav class="h-20 px-8 flex items-center justify-between bg-surface-container border-b border-outline-variant/20 sticky top-0 z-50 w-full">
<div class="flex items-center gap-4 w-1/4">
<div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">pets</span>
</div>
<span class="font-headline font-extrabold text-2xl tracking-tight text-on-surface">MeowFolio</span>
</div>
<!-- Center Navigation Links -->
<div class="flex items-center gap-8 justify-center flex-1">
<a class="font-label text-on-surface-variant hover:text-on-surface transition-colors" href="#">Dashboard</a>
<a class="font-label text-on-surface-variant hover:text-on-surface transition-colors" href="#">Resumes</a>
<a class="font-label nav-link-active" href="#">JD Analyzer</a>
<a class="font-label text-on-surface-variant hover:text-on-surface transition-colors" href="#">ATS Scorer</a>
</div>
<!-- Right Action Items -->
<div class="flex items-center justify-end gap-6 w-1/4">

<div class="relative group">
<div class="flex items-center gap-1 cursor-pointer">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-fixed">
<img alt="User Profile Icon" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcJP14wtmre-YIUTVM9YzZDc5UNmURSygGM3cyjrgRDZ1DWTuGRkXMgjjLPcWB3AD87ov3ZMkLLymT3HvRz5spNCnnG1_YIg0DWUwP0WLilRVmjjGhdtYQJ7CzA-wNm5m8ik56C_EXvcgBYza6W44Hh9fptSwJI-fL5cVdbjQaNo9brn5uMw8JdTlGITb5q4eGMXBu4NxbBZmEOMik0fTKuZkz2-b7W-0FqoUuV_9qPyWlXoU8eraKkD2nSv1vPGqD47TL3saVgaYn"/>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-lg">expand_more</span>
</div>
<!-- Dropdown Menu -->
<div class="absolute right-0 mt-2 w-48 bg-surface-container-lowest border border-outline-variant/20 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-[60] py-2">
<a class="flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:bg-surface-container-high transition-colors font-label text-sm" href="#">
<span class="material-symbols-outlined text-lg">person</span>
                        My Profile
                    </a>
<div class="h-px bg-outline-variant/10 my-1"></div>
<a class="flex items-center gap-3 px-4 py-2 text-error hover:bg-error-container/20 transition-colors font-label text-sm" href="#">
<span class="material-symbols-outlined text-lg">logout</span>
                        Logout
                    </a>
</div>
</div>
</div>

<div class="flex flex-1 overflow-hidden w-full">
<!-- Main Workspace (Full Width) -->
<main class="flex-1 flex overflow-hidden p-6 gap-6 bg-surface">
<!-- Left Panel: Input Area -->
<section class="w-[40%] flex flex-col gap-6 overflow-y-auto pr-2">
<div class="bg-surface-container-low p-8 rounded-lg flex flex-col gap-8 flex-1 border border-outline-variant/10">
<header>
<span class="font-label text-xs font-bold uppercase tracking-widest text-primary mb-2 block">Preparation</span>
<h1 class="font-headline text-3xl font-extrabold text-on-surface">JD Analysis</h1>
</header>
<div class="flex flex-col gap-4">
<label class="font-label font-bold text-on-surface-variant ml-2">Select Resume</label>
<!-- High-fidelity Resume Card -->
<div class="group relative bg-surface-container-lowest rounded-2xl p-4 custom-shadow border border-outline-variant/10 cursor-pointer hover:border-primary/30 transition-all overflow-hidden">
<div class="resume-skeleton w-full aspect-[3/4] rounded-lg p-6 flex flex-col gap-4 mb-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-fixed shrink-0"></div>
<div class="flex-1 space-y-2">
<div class="h-2 w-1/2 bg-outline-variant/30 rounded"></div>
<div class="h-2 w-1/4 bg-outline-variant/20 rounded"></div>
</div>
</div>
<div class="space-y-3 pt-4 border-t border-outline-variant/10">
<div class="h-2 w-full bg-outline-variant/20 rounded"></div>
<div class="h-2 w-full bg-outline-variant/20 rounded"></div>
<div class="h-2 w-3/4 bg-outline-variant/20 rounded"></div>
</div>
<div class="space-y-3 pt-2">
<div class="h-2 w-full bg-outline-variant/20 rounded"></div>
<div class="h-2 w-5/6 bg-outline-variant/20 rounded"></div>
</div>
<div class="mt-auto flex justify-between items-end">
<div class="h-8 w-8 bg-tertiary-fixed rounded-sm"></div>
<div class="h-2 w-1/4 bg-outline-variant/10 rounded"></div>
</div>
</div>
<div class="flex items-center justify-between px-2">
<div class="flex flex-col min-w-0">
<span class="text-[10px] font-bold text-primary uppercase tracking-tighter">Active Resume</span>
<span class="font-bold text-on-surface truncate">Product_Designer_Senior_2024.pdf</span>
</div>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-container text-on-surface-variant hover:bg-primary-container hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-lg">swap_horiz</span>
</button>
</div>
</div>
</div>
</div>
</section>
<!-- Right Panel: Analysis Results -->
<section class="w-[60%] flex flex-col gap-6 overflow-y-auto"><div class="bg-surface-container-low p-8 rounded-lg flex flex-col gap-8 flex-1 border border-outline-variant/10">

<h2 class="font-headline text-3xl font-extrabold text-on-surface">Job Description</h2>
</header>
<div class="flex flex-col gap-4 flex-1">
<label class="font-label font-bold text-on-surface-variant ml-2">Paste Job Description</label>
<textarea class="w-full flex-1 min-h-[250px] bg-surface-container-highest border-none rounded-xl p-6 focus:ring-2 focus:ring-primary-fixed text-on-surface placeholder:text-outline/50 resize-none font-body leading-relaxed" placeholder="Copy and paste the job role requirements here..."></textarea>
</div>
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 font-label font-bold text-outline/40">or</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<div class="flex flex-col gap-4">
<label class="font-label font-bold text-on-surface-variant ml-2">Upload a Job Description</label>
<div class="border-2 border-dashed border-outline-variant/30 bg-surface-container-lowest/50 rounded-2xl p-8 flex flex-col items-center justify-center gap-3 hover:bg-surface-container-lowest hover:border-primary/50 transition-all cursor-pointer group">
<div class="w-12 h-12 rounded-full bg-primary-fixed/30 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary">upload_file</span>
</div>
<div class="text-center">
<p class="font-bold text-on-surface">Click to upload or drag &amp; drop</p>
<p class="text-xs text-on-surface-variant">PDF, DOCX, or TXT (Max. 5MB)</p>
</div>
</div>
</div>
<button class="w-full py-4 bg-primary text-on-primary font-headline font-bold text-lg rounded-full custom-shadow hover:scale-[1.02] active:scale-[0.97] transition-all flex items-center justify-center gap-3 mt-4">
<span class="material-symbols-outlined">query_stats</span>
        Start Analysis
    </button>
</div></section>
</main>
</div>
